<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>阿湫临时邮箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #5b6e8c;
            --border-color: #e9eef3;
            --accent-color: #1e3c72;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --marquee-bg: rgba(255, 255, 255, 0.15);
            --result-bg: rgba(30, 60, 114, 0.05);
            --tag-bg: #eef2ff;
        }
        body.dark {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #60a5fa;
            --glass-bg: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --marquee-bg: rgba(0, 0, 0, 0.3);
            --result-bg: rgba(96, 165, 250, 0.1);
            --tag-bg: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }
        .marquee-container {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--marquee-bg); backdrop-filter: blur(12px);
            padding: 8px 0; z-index: 100; border-bottom: 1px solid var(--glass-border);
            overflow: hidden;
        }
        .marquee {
            white-space: nowrap; display: inline-block;
            animation: marquee 22s linear infinite;
        }
        .marquee a {
            color: var(--text-primary); font-weight: bold; text-decoration: none;
            padding: 0 30px; font-size: 15px; display: inline-block;
            background: rgba(255,255,255,0.2); border-radius: 30px; margin: 0 5px;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px 40px; }
        .search-header {
            background: var(--card-bg); border-radius: 32px;
            padding: 32px 40px; margin-bottom: 24px;
            border: 1px solid var(--border-color); text-align: center;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            margin-top: 15px; margin-bottom: 15px; border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(135deg, #4a6cf7, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .mail-display {
            background: var(--result-bg); padding: 16px 24px;
            border-radius: 60px; font-family: monospace;
            font-size: 1.1rem; font-weight: 600; margin: 20px 0;
            color: var(--text-primary); border: 1px solid var(--border-color);
        }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn {
            min-width: 120px; padding: 12px 24px; border-radius: 60px;
            border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-p { background: var(--accent-color); color: white; }
        .btn-s { background: var(--tag-bg); color: var(--text-primary); }
        .btn:active { transform: scale(0.98); }
        .results-container {
            background: var(--card-bg); border-radius: 32px;
            padding: 24px; border: 1px solid var(--border-color);
            min-height: 300px;
        }
        .results-title {
            font-size: 0.9rem; color: var(--text-secondary);
            margin-bottom: 20px; padding-left: 10px;
            border-left: 4px solid var(--accent-color);
        }
        .msg-item {
            background: var(--result-bg); border-radius: 20px;
            padding: 20px; margin-bottom: 16px; border: 1px solid var(--border-color);
            transition: 0.2s; cursor: pointer;
        }
        .msg-item:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .msg-meta { font-size: 0.75rem; color: var(--accent-color); font-weight: bold; margin-bottom: 5px; }
        .msg-subject { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); }
        
        /* 新增：邮件详情弹窗样式 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 200;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 650px; height: 85vh;
            border-radius: 28px; display: flex; flex-direction: column;
            border: 1px solid var(--border-color); overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 20px 25px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; color: var(--text-primary); background: #fff; }
        body.dark .modal-body { background: #f8fafc; color: #1e293b; } /* 详情页内容白底黑字更清晰 */
        .close-btn { 
            background: var(--tag-bg); color: var(--text-primary); 
            border: none; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        .music-player { position: fixed; bottom: 25px; right: 25px; z-index: 102; }
        .music-toggle {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--card-bg); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .music-toggle.playing { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .theme-toggle {
            position: fixed; top: 70px; right: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: var(--card-bg);
            border: 1px solid var(--border-color); display: flex;
            align-items: center; justify-content: center; cursor: pointer; z-index: 101;
        }
        @media (max-width: 640px) {
            .container { padding-top: 80px; }
            .search-header, .results-container { border-radius: 24px; padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee">
            <a href="https://t.me/icc469" target="_blank" rel="noopener noreferrer">🔥 完全免费无需注册登录，自动加载随机邮箱且可一键更换，邮件不做保留，阅后即焚隐私安全/接收不到邮件请点击与我联系</a>
            <a href="https://t.me/icc469" target="_blank" rel="noopener noreferrer">🔥 完全免费无需注册登录，自动加载随机邮箱且可一键更换，邮件不做保留，阅后即焚隐私安全/接收不到邮件请点击与我联系</a>
        </div>
    </div>
    <div class="theme-toggle" id="themeToggle">🌙</div>
    
    <div class="container">
        <div class="search-header">
            <h1>阿湫临时邮箱</h1>
            <img src="https://mpimg.cn/view.php/d98dc784af29c47a1dcebb703cc5ff4c.jpg" class="avatar">
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">📭 阅后即焚 · 隐私保护 · 完全免费</p>
            <div id="addr" class="mail-display">初始化服务中...</div>
            <div class="btn-group">
                <button onclick="copyMail()" class="btn btn-s">📋 复制地址</button>
                <button id="refreshBtn" onclick="init()" class="btn btn-p">🔄 更换地址</button>
            </div>
        </div>
        <div class="results-container">
            <div class="results-title">📥 实时收件箱 (仅存留于当前页面)</div>
            <div id="list">
                <div style="text-align: center; padding: 60px; color: var(--text-secondary);">正在等待新邮件推送...</div>
            </div>
        </div>
    </div>

    <div id="mailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalSubject" style="font-weight: bold; font-size: 1.1rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 70%;">邮件详情</span>
                <button class="close-btn" onclick="closeMail()">关闭</button>
            </div>
            <div id="modalBody" class="modal-body">加载详情中...</div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-toggle" id="musicToggle">💿</div>
    </div>
    <audio id="bgm" loop preload="auto" src="https://mpimg.cn/view.php/7f3661918b95b812a89d37c927ca7da1.mp3"></audio>

    <script>
        const API_KEY = 'vmail_zgzkpsmpQmWMhq50WfCIBiMMtTb7EtSY';
        const PROXY = 'https://vmail.dev/api/v1';
        let mid = null;
        let isInitializing = false;

        document.getElementById('themeToggle').onclick = function() {
            document.body.classList.toggle('dark');
            this.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        };

        const music = document.getElementById('bgm');
        const mBtn = document.getElementById('musicToggle');
        mBtn.onclick = (e) => {
            e.stopPropagation();
            if(music.paused) { music.play(); mBtn.classList.add('playing'); }
            else { music.pause(); mBtn.classList.remove('playing'); }
        };

        function autoPlayMusic() {
            music.play().then(() => {
                mBtn.classList.add('playing');
                document.removeEventListener('click', autoPlayMusic);
                document.removeEventListener('touchstart', autoPlayMusic);
            }).catch(() => {});
        }

        async function init(retries = 3) {
            if (isInitializing && retries === 3) return;
            isInitializing = true;
            const addrEl = document.getElementById('addr');
            const listEl = document.getElementById('list');
            addrEl.innerText = "⚡ 正在生成随机邮箱...";
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const r = await fetch(`${PROXY}/mailboxes`, {
                    method:'POST', 
                    headers:{'X-API-Key':API_KEY,'Content-Type':'application/json'},
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!r.ok) throw new Error('Proxy API Error');
                const {data} = await r.json();
                mid = data.id;
                addrEl.innerText = data.address;
                listEl.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-secondary);">🚀 邮箱已就绪，正在监听新邮件...</div>';
            } catch(e) { 
                if (retries > 0) setTimeout(() => init(retries - 1), 1000);
                else { addrEl.innerText = "⚠️ 生成失败，请点下方按钮重试"; isInitializing = false; }
            } finally { if (mid) isInitializing = false; }
        }

        async function refresh() {
            if(!mid || isInitializing) return;
            try {
                const r = await fetch(`${PROXY}/mailboxes/${mid}/messages`, {headers:{'X-API-Key':API_KEY}});
                const {data} = await r.json();
                const box = document.getElementById('list');
                if(data.length === 0) return;
                box.innerHTML = data.map(m => `
                    <div class="msg-item" onclick="viewMail('${m.id}', '${m.subject || '无主题'}')">
                        <div class="msg-meta">来自: ${m.from.address} | ${new Date(m.receivedAt).toLocaleTimeString()}</div>
                        <div class="msg-subject">${m.subject || '（无主题）'}</div>
                        <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:8px;">${m.preview || '点击查看详情'}...</div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        // 新增：查看邮件详情逻辑
        async function viewMail(msgId, subject) {
            const modal = document.getElementById('mailModal');
            const mBody = document.getElementById('modalBody');
            const mSub = document.getElementById('modalSubject');
            mSub.innerText = subject;
            mBody.innerHTML = '<div style="text-align:center;padding:50px;color:#5b6e8c;">⚡ 正在加载详情正文...</div>';
            modal.style.display = 'flex';
            try {
                const r = await fetch(`${PROXY}/mailboxes/${mid}/messages/${msgId}`, {headers:{'X-API-Key':API_KEY}});
                const {data} = await r.json();
                // 优先显示HTML正文，其次纯文本
                mBody.innerHTML = data.html || `<div style="white-space:pre-wrap">${data.text}</div>`;
            } catch(e) {
                mBody.innerHTML = '❌ 加载详情失败，请稍后重试。';
            }
        }

        function closeMail() { document.getElementById('mailModal').style.display = 'none'; }

        window.addEventListener('DOMContentLoaded', () => {
            init();
            setInterval(refresh, 5000); 
            autoPlayMusic();
            document.addEventListener('click', autoPlayMusic);
            document.addEventListener('touchstart', autoPlayMusic);
        });

        function copyMail() {
            const val = document.getElementById('addr').innerText;
            if (val.includes('@')) {
                navigator.clipboard.writeText(val);
                alert('复制成功！注意：刷新页面后该地址将永久失效');
            } else {
                alert('地址尚未准备好，请稍等或重试');
            }
        }
    </script>
</body>
</html>
